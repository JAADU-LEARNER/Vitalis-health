<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Medicine Ordering | The Clinical Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f7f9fb] font-['Inter'] text-[#191c1e] antialiased">
    <header class="bg-white/70 backdrop-blur-xl docked full-width top-0 sticky z-50 flex justify-between items-center px-8 h-16 w-full shadow-sm">
        <div class="flex items-center gap-8">
            <span class="text-xl font-light tracking-tighter text-[#00488d] font-['Manrope']">The Clinical Atelier</span>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-slate-500 hover:text-[#00488d] font-semibold text-sm transition-colors" href="{{ url_for('dashboard') }}">Dashboard</a>
            </nav>
        </div>
    </header>
    <main class="max-w-4xl mx-auto py-12 px-6">
        <h1 class="text-4xl font-light font-['Manrope'] mb-8">Order Medications</h1>
        <div class="bg-white p-8 rounded-xl shadow-sm mb-12">
            <h2 class="text-2xl font-semibold mb-6">New Order</h2>
            <form action="{{ url_for('ordering') }}" method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Medication Name</label>
                        <input type="text" name="medication_name" placeholder="e.g. Amoxicillin" class="w-full border-gray-300 rounded-lg p-3 bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Quantity</label>
                        <input type="number" name="quantity" min="1" value="1" class="w-full border-gray-300 rounded-lg p-3 bg-gray-50" required>
                    </div>
                </div>
                <button type="submit" class="bg-[#00488d] text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-800 transition-colors w-full md:w-auto">Place Order</button>
            </form>
        </div>

        <h2 class="text-2xl font-light font-['Manrope'] mb-6">Order History</h2>
        <div class="space-y-4">
            {% for order in orders %}
            <div class="bg-white p-6 rounded-xl shadow-sm flex justify-between items-center border border-gray-100">
                <div>
                    <h3 class="font-semibold text-lg">{{ order.medication_name }} (x{{ order.quantity }})</h3>
                    <p class="text-sm text-gray-500">Ordered on: {{ order.date }}</p>
                </div>
                <div class="text-sm font-bold uppercase tracking-wider px-3 py-1 rounded-full {% if order.status == 'Pending' %}bg-yellow-100 text-yellow-800{% elif order.status == 'Shipped' %}bg-blue-100 text-blue-800{% else %}bg-green-100 text-green-800{% endif %}">
                    {{ order.status }}
                </div>
            </div>
            {% else %}
            <div class="bg-white p-6 rounded-xl shadow-sm text-center">
                <p class="text-gray-500">No previous orders found.</p>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
