<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Settings | The Clinical Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f7f9fb] font-['Inter'] text-[#191c1e] antialiased">
    <header class="bg-white/70 backdrop-blur-xl docked full-width top-0 sticky z-50 flex justify-between items-center px-8 h-16 w-full shadow-sm">
        <div class="flex items-center gap-8">
            <span class="text-xl font-light tracking-tighter text-[#00488d] font-['Manrope']">The Clinical Atelier</span>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-slate-500 hover:text-[#00488d] font-semibold text-sm transition-colors" href="{{ url_for('dashboard') }}">Dashboard</a>
            </nav>
        </div>
    </header>
    <main class="max-w-4xl mx-auto py-12 px-6">
        <h1 class="text-4xl font-light font-['Manrope'] mb-8">Settings</h1>
        <div class="bg-white p-8 rounded-xl shadow-sm space-y-6">
            <div class="flex items-center justify-between py-4 border-b border-gray-100">
                <div>
                    <h3 class="font-semibold text-lg">Email Notifications</h3>
                    <p class="text-sm text-gray-500">Receive alerts for upcoming appointments.</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" value="" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#00488d]"></div>
                </label>
            </div>
            <div class="flex items-center justify-between py-4 border-b border-gray-100">
                <div>
                    <h3 class="font-semibold text-lg">SMS Alerts</h3>
                    <p class="text-sm text-gray-500">Receive text messages for important updates.</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" value="" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#00488d]"></div>
                </label>
            </div>
            <button class="bg-[#00488d] text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-800 transition-colors mt-4">Save Preferences</button>
        </div>
    </main>
</body>
</html>
