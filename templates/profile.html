<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | The Clinical Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f7f9fb] font-['Inter'] text-[#191c1e] antialiased">
    <header class="bg-white/70 backdrop-blur-xl docked full-width top-0 sticky z-50 flex justify-between items-center px-8 h-16 w-full shadow-sm">
        <div class="flex items-center gap-8">
            <span class="text-xl font-light tracking-tighter text-[#00488d] font-['Manrope']">The Clinical Atelier</span>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-slate-500 hover:text-[#00488d] font-semibold text-sm transition-colors" href="{{ url_for('dashboard') }}">Dashboard</a>
            </nav>
        </div>
    </header>
    <main class="max-w-4xl mx-auto py-12 px-6">
        <h1 class="text-4xl font-light font-['Manrope'] mb-8">Patient Profile</h1>
        <div class="bg-white p-8 rounded-xl shadow-sm">
            <form action="{{ url_for('profile') }}" method="POST">
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Full Name</label>
                    <input type="text" name="name" value="{{ user.name }}" class="w-full border-gray-300 rounded-lg p-3 bg-gray-50">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Email</label>
                    <input type="email" name="email" value="{{ user.email }}" class="w-full border-gray-300 rounded-lg p-3 bg-gray-50">
                </div>
                <button type="submit" class="bg-[#00488d] text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-800 transition-colors">Update Profile</button>
            </form>
        </div>
    </main>
</body>
</html>
